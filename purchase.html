<body class="bg-brand-50 text-slate-800">

  <div id="irt-purchase-root"></div>

  <!-- React Libraries -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Main React Application -->
  <script type="text/babel">
    const { useState } = React;

    // ⭐ URL ของ Google Apps Script
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUGeIiAEu3JkIjCIsQ3WyoJMYA7PZ90vEDrDsOSi6Pc2MHd2VIwbwUFI8GuQtoqK5VeQ/exec';

    function Page() {
      const pkgName = "IRT GOLD PC + MB V.5.0";

      const [formData, setFormData] = useState({
        fullName: '',
        email: '',
        phone: '',
        mt5: '',
        tradingview: '',
        purchaseDate: new Date().toISOString().split('T')[0],
      });
      
      const [slipFile, setSlipFile] = useState(null);
      const [slipPreview, setSlipPreview] = useState(null);
      const [status, setStatus] = useState('idle');
      const [errorMsg, setErrorMsg] = useState('');

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          setSlipFile(file);
          const reader = new FileReader();
          reader.onloadend = () => setSlipPreview(reader.result);
          reader.readAsDataURL(file);
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (!slipFile) {
          alert('กรุณาแนบสลิปการโอนเงิน');
          return;
        }

        setStatus('submitting');
        setErrorMsg('');

        try {
          const reader = new FileReader();
          reader.readAsDataURL(slipFile);
          
          reader.onload = async () => {
            const base64Data = reader.result.split(',')[1];
            
            const payload = new FormData();
            payload.append('selectedPackage', pkgName);
            payload.append('fullName', formData.fullName);
            payload.append('email', formData.email);
            payload.append('phone', formData.phone);
            payload.append('mt5', formData.mt5);
            payload.append('tradingview', formData.tradingview);
            payload.append('mbTradingview', formData.tradingview);
            payload.append('purchaseDate', formData.purchaseDate);
            payload.append('slipBase64', base64Data);
            payload.append('slipName', slipFile.name);
            payload.append('slipType', slipFile.type);

            const response = await fetch(SCRIPT_URL, {
              method: 'POST',
              body: payload,
            });

            const result = await response.json();

            if (result.ok) {
              setStatus('success');
              window.scrollTo(0,0);
            } else {
              throw new Error(result.error || 'Submission failed');
            }
          };

          reader.onerror = () => {
            throw new Error("Failed to read file");
          };

        } catch (err) {
          console.error(err);
          setStatus('error');
          setErrorMsg('เกิดข้อผิดพลาดในการส่งข้อมูล: ' + err.message);
        }
      };

      // Success Page
      if (status === 'success') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 px-4 py-10">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full text-center border border-blue-100">
              
              <div className="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6 animate-bounce">
                <span className="text-5xl">✅</span>
              </div>

              <h2 className="text-3xl font-bold text-brand-800 mb-2">ลงทะเบียนสำเร็จ!</h2>
              <p className="text-slate-500 mb-8 text-lg">
                เราได้รับข้อมูลของคุณเรียบร้อยแล้ว
              </p>

              <div className="relative flex justify-between items-start mb-10 text-sm text-left">
                <div className="absolute top-4 left-4 right-4 h-1 bg-gray-100 -z-10"></div>
                <div className="absolute top-4 left-4 right-1/2 h-1 bg-brand-200 -z-10"></div>

                <div className="flex flex-col items-center w-1/3 text-center">
                  <div className="w-8 h-8 rounded-full bg-brand-600 text-white flex items-center justify-center font-bold mb-2 shadow-md ring-4 ring-white">1</div>
                  <p className="font-bold text-brand-700">แจ้งโอน</p>
                  <p className="text-xs text-slate-400">เสร็จสิ้น</p>
                </div>

                <div className="flex flex-col items-center w-1/3 text-center">
                  <div className="w-8 h-8 rounded-full bg-white border-2 border-brand-300 text-brand-300 flex items-center justify-center font-bold mb-2 shadow-sm">2</div>
                  <p className="font-bold text-slate-600">รอตรวจสอบ</p>
                  <p className="text-xs text-slate-400">~15-60 นาที</p>
                </div>

                <div className="flex flex-col items-center w-1/3 text-center">
                  <div className="w-8 h-8 rounded-full bg-white border-2 border-slate-200 text-slate-300 flex items-center justify-center font-bold mb-2 shadow-sm">3</div>
                  <p className="font-bold text-slate-600">รับสินค้า</p>
                  <p className="text-xs text-slate-400">ทางอีเมล</p>
                </div>
              </div>

              <div className="bg-blue-50 rounded-xl p-4 mb-8 text-left border border-blue-100">
                <p className="text-brand-800 font-semibold mb-1">ℹ️ สิ่งที่ต้องทำตอนนี้:</p>
                <p className="text-sm text-slate-600 pl-6">
                  ทีมงานกำลังตรวจสอบสลิปของคุณ เมื่อเรียบร้อยแล้ว ระบบจะส่ง <strong>License Key</strong> และ <strong>คู่มือติดตั้ง</strong> ไปยังอีเมล: <br/>
                  <span className="font-bold text-brand-600 block mt-1">{formData.email}</span>
                </p>
              </div>

              <a href="index.html" className="block w-full bg-brand-600 text-white px-6 py-4 rounded-xl font-bold hover:bg-brand-700 transition shadow-lg shadow-blue-200">
                🏠 กลับหน้าหลัก
              </a>
            </div>
          </div>
        );
      }

      // Main Form Page
      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100">
          
          {/* Header Banner */}
          <div className="gradient-bg text-white py-8 mb-8 relative overflow-hidden">
            <div className="absolute inset-0 opacity-10">
              <div className="absolute top-0 left-0 w-40 h-40 bg-white rounded-full -translate-x-1/2 -translate-y-1/2"></div>
              <div className="absolute bottom-0 right-0 w-60 h-60 bg-white rounded-full translate-x-1/2 translate-y-1/2"></div>
            </div>
            <div className="max-w-2xl mx-auto px-4 relative text-center">
              <div className="flex items-center justify-center gap-4 mb-3">
                <img src="https://raw.githubusercontent.com/irtgold/irtgold/main/Github-p/icon/irt.png" alt="IRT GOLD" className="w-16 h-16 rounded-2xl shadow-lg" />
                <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight">
                  ลงทะเบียนรับไฟล์
                </h1>
              </div>
              <p className="text-blue-100 text-lg">กรอกข้อมูลและแจ้งชำระเงินเพื่อรับไฟล์ทันที</p>
            </div>
          </div>

          <div className="max-w-2xl mx-auto px-4 pb-12">
            
            {/* Product Card */}
            <div className="glass rounded-2xl shadow-xl border border-white/50 overflow-hidden mb-6">
              <div className="gradient-bg p-5 text-white text-center">
                <h3 className="font-bold text-xl">📦 รายการสั่งซื้อ</h3>
              </div>
              <div className="p-6">
                <div className="text-center mb-6">
                  <span className="bg-gradient-to-r from-amber-400 to-orange-500 text-white text-xs font-bold px-4 py-1.5 rounded-full shadow-lg inline-flex items-center gap-1">
                    🔥 BEST SELLER
                  </span>
                  <h4 className="font-bold text-slate-800 text-2xl mt-4">{pkgName}</h4>
                </div>
                
                <div className="border-t border-slate-100 pt-5">
                  <h5 className="font-bold text-slate-700 mb-4 flex items-center">🎁 สิ่งที่คุณจะได้รับ</h5>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div className="flex items-center gap-3">
                      <span className="text-xl">✅</span>
                      <span className="text-slate-600">Indicator สำหรับ PC และมือถือ</span>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="text-xl">✅</span>
                      <span className="text-slate-600">License Key ใช้งานได้ตลอดชีพ</span>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="text-xl">✅</span>
                      <span className="text-slate-600">คู่มือการติดตั้งและใช้งาน</span>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="text-xl">✅</span>
                      <span className="text-slate-600">อัปเดตฟรีตลอดชีพ</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Form */}
            <form onSubmit={handleSubmit} className="glass rounded-2xl shadow-xl border border-white/50 p-6 md:p-8">
              
              {/* Section 1: Personal Info */}
              <div className="mb-8">
                <div className="flex items-center gap-3 mb-6">
                  <span className="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl flex items-center justify-center font-bold shadow-lg">1</span>
                  <h3 className="font-bold text-xl text-slate-800">ข้อมูลผู้ซื้อ</h3>
                </div>

                <div className="space-y-5">
                  <div>
                    <label className="block text-sm font-semibold text-slate-700 mb-2">
                      👤 ชื่อ-นามสกุล <span className="text-red-500">*</span>
                    </label>
                    <input 
                      type="text" 
                      name="fullName" 
                      required
                      value={formData.fullName}
                      onChange={handleChange}
                      className="w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none transition bg-white input-focus"
                      placeholder="นายไออาร์ทีโกล์ เทรดทอง"
                    />
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">
                        📧 อีเมล <span className="text-red-500">*</span>
                      </label>
                      <input 
                        type="email" 
                        name="email" 
                        required
                        value={formData.email}
                        onChange={handleChange}
                        className="w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none transition bg-white input-focus"
                        placeholder="example@gmail.com"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">
                        📱 เบอร์โทรศัพท์ <span className="text-red-500">*</span>
                      </label>
                      <input 
                        type="tel" 
                        name="phone" 
                        required
                        value={formData.phone}
                        onChange={handleChange}
                        className="w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none transition bg-white input-focus"
                        placeholder="0912345678"
                      />
                    </div>
                  </div>
                </div>
              </div>

              {/* Section 2: Trading Account */}
              <div className="mb-8">
                <div className="flex items-center gap-3 mb-6">
                  <span className="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl flex items-center justify-center font-bold shadow-lg">2</span>
                  <h3 className="font-bold text-xl text-slate-800">ข้อมูลบัญชีเทรด</h3>
                </div>

                <div className="space-y-6">
                  {/* MT5 */}
                  <div className="p-6 bg-gradient-to-r from-slate-50 to-blue-50 rounded-2xl border border-slate-200 text-center">
                    <div className="w-44 h-44 mx-auto mb-5 rounded-3xl shadow-xl overflow-hidden border-4 border-white">
                      <img src="https://raw.githubusercontent.com/irtgold/irtgold/main/Github-p/icon/Mt5.png" alt="MT5" className="w-full h-full object-cover" />
                    </div>
                    <label className="block text-lg font-semibold text-slate-700 mb-3">
                      เลขบัญชี MT5 (สำหรับ PC) <span className="text-red-500">*</span>
                    </label>
                    <input 
                      type="text" 
                      name="mt5" 
                      required
                      value={formData.mt5}
                      onChange={handleChange}
                      className="w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none transition bg-white input-focus text-center text-lg"
                      placeholder="809876"
                    />
                    <p className="text-sm text-slate-500 mt-3">เลขบัญชีเทรด tptrades หรือโบรกเกอร์ที่รองรับ MT5</p>
                  </div>

                  {/* TradingView */}
                  <div className="p-6 bg-gradient-to-r from-slate-50 to-blue-50 rounded-2xl border border-slate-200 text-center">
                    <div className="w-44 h-44 mx-auto mb-5 rounded-3xl shadow-xl overflow-hidden border-4 border-white">
                      <img src="https://raw.githubusercontent.com/irtgold/irtgold/main/Github-p/icon/Tdv.png" alt="TradingView" className="w-full h-full object-cover" />
                    </div>
                    <label className="block text-lg font-semibold text-slate-700 mb-3">
                      ชื่อผู้ใช้ TradingView (สำหรับ Mobile) <span className="text-red-500">*</span>
                    </label>
                    <input 
                      type="text" 
                      name="tradingview" 
                      required
                      value={formData.tradingview}
                      onChange={handleChange}
                      className="w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none transition bg-white input-focus text-center text-lg"
                      placeholder="IRTGOLD"
                    />
                    <p className="text-sm text-slate-500 mt-3">Username ของบัญชี TradingView</p>
                  </div>
                </div>
              </div>

              {/* Section 3: Payment */}
              <div className="mb-8">
                <div className="flex items-center gap-3 mb-6">
                  <span className="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-xl flex items-center justify-center font-bold shadow-lg">3</span>
                  <h3 className="font-bold text-xl text-slate-800">แจ้งชำระเงิน</h3>
                </div>

                <div className="space-y-5">
                  <div>
                    <label className="block text-sm font-semibold text-slate-700 mb-2">
                      🧾 แนบสลิปโอนเงิน <span className="text-red-500">*</span>
                    </label>
                    
                    <label className={`flex flex-col items-center justify-center w-full h-44 border-2 border-dashed rounded-2xl cursor-pointer transition ${slipPreview ? 'border-blue-400 bg-blue-50' : 'border-blue-300 bg-gradient-to-br from-blue-50 to-indigo-50 hover:from-blue-100 hover:to-indigo-100 hover:border-blue-400'} group`}>
                      {slipPreview ? (
                        <div className="w-full h-full p-2 relative group">
                          <img src={slipPreview} alt="Slip preview" className="w-full h-full object-contain" />
                          <div className="absolute inset-0 bg-black bg-opacity-40 hidden group-hover:flex items-center justify-center text-white text-sm font-medium rounded-lg">เปลี่ยนรูปภาพ</div>
                        </div>
                      ) : (
                        <div className="flex flex-col items-center justify-center py-6">
                          <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center mb-4 shadow-lg group-hover:scale-110 transition">
                            <span className="text-4xl">📁</span>
                          </div>
                          <p className="text-sm text-slate-600">
                            <span className="font-bold text-blue-600">คลิกเพื่ออัปโหลด</span> หรือลากไฟล์มาวาง
                          </p>
                          <p className="text-xs text-slate-400 mt-1">รองรับ JPG, PNG (สูงสุด 5MB)</p>
                        </div>
                      )}
                      <input type="file" className="hidden" accept="image/*" onChange={handleFileChange} />
                    </label>
                  </div>
                  
                  <div>
                    <label className="block text-sm font-semibold text-slate-700 mb-2">
                      📅 วันที่โอน

                    <input

                      name="purchaseDate"
                      value={formData.purchaseDate}
                      onChange={handleChange}

              </div>

              {errorMsg && (

              <button

                disabled={status === 'submitting'}

              >

                    <div className="spinner mr-2"></div> กำลังส่งข้อมูล...

                  <div className="w-14 h-14 rounded-xl overflow-hidden shadow-lg group-hover:scale-110 transition">
